name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: 🔍 Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Установка зависимостей
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Проверка кода (ruff)
        run: ruff check backend/ --output-format=github

  test:
    name: 🧪 Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Установка зависимостей
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Запуск тестов
        run: |
          cd backend
          pytest -v --tb=short
