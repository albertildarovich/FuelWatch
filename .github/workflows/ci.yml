name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: 🔍 Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Установка зависимостей
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Проверка кода (ruff)
        run: ruff check backend/ --output-format=github

  test:
    name: 🧪 Tests (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fuelwatch
          POSTGRES_PASSWORD: fuelwatch_pass
          POSTGRES_DB: fuelwatch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U fuelwatch
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Установка зависимостей
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Применение миграций
        env:
          DATABASE_URL: postgresql+asyncpg://fuelwatch:fuelwatch_pass@localhost:5432/fuelwatch_test
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
        run: |
          cd backend
          alembic upgrade head

      - name: Запуск тестов
        env:
          DATABASE_URL: postgresql+asyncpg://fuelwatch:fuelwatch_pass@localhost:5432/fuelwatch_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          JWT_SECRET_KEY: test-secret-key
        run: |
          cd backend
          pytest -v --tb=short
