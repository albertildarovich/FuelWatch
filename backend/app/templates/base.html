<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FuelWatch{% endblock %} — Мониторинг цен на топливо</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="/static/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">
                <i class="bi bi-fuel-pump"></i> FuelWatch
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">
                            <i class="bi bi-speedometer2"></i> Цены
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/alerts">
                            <i class="bi bi-bell"></i> Уведомления
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/stations">
                            <i class="bi bi-geo-alt"></i> АЗС
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" id="auth-section">
                        <a class="nav-link" href="/login" id="login-link">
                            <i class="bi bi-box-arrow-in-right"></i> Войти
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Контент -->
    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer mt-auto py-3 bg-dark border-top border-secondary">
        <div class="container text-center">
            <span class="text-muted">
                <i class="bi bi-fuel-pump"></i> FuelWatch — сервис мониторинга цен на топливо
            </span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Проверка авторизации на клиенте
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('access_token');
            const authSection = document.getElementById('auth-section');
            const loginLink = document.getElementById('login-link');
            
            if (token) {
                try {
                    // Декодируем JWT payload (без проверки подписи)
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    authSection.innerHTML = `
                        <div class="dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                                <i class="bi bi-person-circle"></i> ${payload.email || 'User'}
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="#" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Выйти</a></li>
                            </ul>
                        </div>
                    `;
                } catch(e) {
                    localStorage.removeItem('access_token');
                }
            }
        });

        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            window.location.href = '/login';
        }
    </script>
</body>
</html>
