{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h2 class="text-center mb-4">
                    <i class="bi bi-fuel-pump"></i> FuelWatch
                </h2>
                <h5 class="text-center text-muted mb-4">Регистрация</h5>

                <form id="register-form">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="password" name="password" required minlength="6">
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Подтвердите пароль</label>
                        <input type="password" class="form-control" id="confirm_password" required minlength="6">
                    </div>
                    <div id="error-message"></div>
                    <button type="submit" class="btn btn-success w-100 mb-3">
                        <i class="bi bi-person-plus"></i> Зарегистрироваться
                    </button>
                </form>

                <p class="text-center text-muted mb-0">
                    Уже есть аккаунт? <a href="/login">Войти</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('register-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm_password').value;
    const errorDiv = document.getElementById('error-message');

    if (password !== confirmPassword) {
        errorDiv.innerHTML = '<div class="alert alert-danger">Пароли не совпадают</div>';
        return;
    }

    try {
        const response = await fetch('/api/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, password})
        });

        if (response.ok) {
            window.location.href = '/login?registered=1';
        } else {
            const data = await response.json();
            errorDiv.innerHTML = '<div class="alert alert-danger">' + (data.detail || 'Ошибка регистрации') + '</div>';
        }
    } catch(err) {
        errorDiv.innerHTML = '<div class="alert alert-danger">Ошибка соединения с сервером</div>';
    }
});
</script>
{% endblock %}
