services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fuelwatch
      POSTGRES_PASSWORD: fuelwatch_pass
      POSTGRES_DB: fuelwatch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fuelwatch"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fuelwatch-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fuelwatch-net

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fuelwatch-net
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fuelwatch-net
    command: celery -A app.tasks.celery_app worker -l info

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fuelwatch-net
    command: celery -A app.tasks.celery_app beat -l info

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - redis
    ports:
      - "5555:5555"
    networks:
      - fuelwatch-net
    command: celery -A app.tasks.celery_app flower --port=5555 --address=0.0.0.0

networks:
  fuelwatch-net:
    driver: bridge

volumes:
  pgdata:
