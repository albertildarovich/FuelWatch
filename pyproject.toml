[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP"]

[tool.ruff.lint.per-file-ignores]
# Alembic env.py вынужденно использует специфичный стиль
"backend/alembic/env.py" = ["E402", "I001"]
# autogenerated миграции — не трогаем
"backend/alembic/versions/*" = ["E", "F", "W", "I", "N", "UP"]

[tool.pytest.ini_options]
testpaths = ["backend/tests"]
asyncio_mode = "auto"
